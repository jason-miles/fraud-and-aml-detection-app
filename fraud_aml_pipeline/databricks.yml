# This is a Databricks asset bundle definition for fraud_aml_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: fraud_aml_pipeline
  uuid: eaec450a-8424-4609-9a84-06436a7b51c0

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://fevm-elexon-app-for-settlement-acc.cloud.databricks.com
    variables:
      catalog: elexon_app_for_settlement_acc_catalog
      schema: investec_fraud_aml_gold
  prod:
    mode: production
    workspace:
      host: https://fevm-elexon-app-for-settlement-acc.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/jason.miles@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/jason.miles@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: elexon_app_for_settlement_acc_catalog
      schema: investec_fraud_aml_gold
    permissions:
      - user_name: jason.miles@databricks.com
        level: CAN_MANAGE
